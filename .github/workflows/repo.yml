name: update repo data
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup data branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin data; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf .
            echo "# data branch auto-generated, do not edit" > README.md
            git add README.md
            git commit -m "init: data branch"
            git push origin data
          fi

      - name: copy scripts to data branch
        run: |
          git checkout origin/main -- .github/scripts/repo.ts .github/scripts/package.json .github/scripts/tsconfig.json

      - name: install script dependencies
        run: npm install --prefix .github/scripts

      - name: fetch and process repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --prefix .github/scripts tsx .github/scripts/repo.ts

      - name: commit if changed
        run: |
          git add repos.json
          if git diff --staged --quiet; then
            echo "no changes, skipping commit"
          else
            git commit -m "chore: update repos $(date -u +'%Y-%m-%d')"
            git push origin data
          fi
